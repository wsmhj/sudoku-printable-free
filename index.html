<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Printable</title>
  <link rel="canonical" href="https://sudokuprintable.me/" />
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; text-align: center; }
    h1 { color: #2c3e50; }
    table { border-collapse: collapse; margin: 20px auto; }
    td { width: 40px; height: 40px; border: 1px solid #999; text-align: center; font-size: 18px; font-weight: bold; }
    td.box-right { border-right: 3px solid #333; }
    td.box-bottom { border-bottom: 3px solid #333; }
    td.box-right.box-bottom { border-right: 3px solid #333; border-bottom: 3px solid #333; }
    .given { color: #2c3e50; }
    button { margin: 8px; padding: 10px 20px; background: #2980b9; color: #fff; border: none; cursor: pointer; border-radius: 4px; font-size: 15px; }
    button:hover { background: #1a6ea8; }
    .cta { display: inline-block; margin-top: 24px; padding: 12px 28px; background: #27ae60; color: #fff; text-decoration: none; border-radius: 4px; font-size: 16px; font-weight: bold; }
    .cta:hover { background: #1e8449; }
    footer { margin-top: 40px; font-size: 0.9em; color: #555; }
  </style>
</head>
<body>
  <h1>Sudoku Printable</h1>
  <p>Generate a free printable Sudoku puzzle instantly.</p>

  <button onclick="generatePuzzle()">New Puzzle</button>
  <button onclick="window.print()" style="background:#8e44ad;">Print</button>

  <table id="sudoku"></table>

  <br />
  <a class="cta" href="https://sudokuprintable.me/">Sudoku Printable</a>

  <footer>
    <p>For more puzzles, visit <a href="https://sudokuprintable.me/">Sudoku Printable</a>.</p>
  </footer>

  <script>
    const sample = [
      [5,3,0,0,7,0,0,0,0],[6,0,0,1,9,5,0,0,0],[0,9,8,0,0,0,0,6,0],
      [8,0,0,0,6,0,0,0,3],[4,0,0,8,0,3,0,0,1],[7,0,0,0,2,0,0,0,6],
      [0,6,0,0,0,0,2,8,0],[0,0,0,4,1,9,0,0,5],[0,0,0,0,8,0,0,7,9]
    ];
    function generatePuzzle() {
      const table = document.getElementById('sudoku');
      table.innerHTML = '';
      for (let r = 0; r < 9; r++) {
        const tr = document.createElement('tr');
        for (let c = 0; c < 9; c++) {
          const td = document.createElement('td');
          let cls = '';
          if (c === 2 || c === 5) cls += ' box-right';
          if (r === 2 || r === 5) cls += ' box-bottom';
          td.className = cls.trim();
          if (sample[r][c]) { td.textContent = sample[r][c]; td.classList.add('given'); }
          tr.appendChild(td);
        }
        table.appendChild(tr);
      }
    }
    generatePuzzle();
  </script>
</body>
</html>
