<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Printable</title>
  <meta name="description" content="Free printable Sudoku puzzles. Generate and print Sudoku at any difficulty level.">
  <link rel="canonical" href="https://sudokuprintable.me/" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a1a; padding: 20px; }
    .container { max-width: 420px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
    table { border-collapse: collapse; margin: 0 auto 20px; }
    td { width: 36px; height: 36px; text-align: center; font-size: 16px; font-weight: 600; border: 1px solid #ccc; }
    td:nth-child(3), td:nth-child(6) { border-right: 2px solid #333; }
    tr:nth-child(3) td, tr:nth-child(6) td { border-bottom: 2px solid #333; }
    .given { color: #333; }
    .empty { color: #999; }
    .full-version { display: block; text-align: center; margin-top: 24px; padding: 14px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 15px; }
    .full-version:hover { background: #1d4ed8; }
    footer { margin-top: 32px; text-align: center; font-size: 12px; color: #999; }
    footer a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sudoku Printable</h1>
    <p class="subtitle">Sample easy puzzle — print free at the full version</p>
    <table id="board"></table>
    <a class="full-version" href="https://sudokuprintable.me/">
      Get Printable Sudoku Puzzles
    </a>
    <footer>
      <p>Full version at <a href="https://sudokuprintable.me/">Sudoku Printable</a></p>
    </footer>
  </div>
  <script>
    var puzzle = [
      [5,3,0,0,7,0,0,0,0],
      [6,0,0,1,9,5,0,0,0],
      [0,9,8,0,0,0,0,6,0],
      [8,0,0,0,6,0,0,0,3],
      [4,0,0,8,0,3,0,0,1],
      [7,0,0,0,2,0,0,0,6],
      [0,6,0,0,0,0,2,8,0],
      [0,0,0,4,1,9,0,0,5],
      [0,0,0,0,8,0,0,7,9]
    ];
    var t = document.getElementById('board');
    puzzle.forEach(function(row) {
      var tr = t.insertRow();
      row.forEach(function(cell) {
        var td = tr.insertCell();
        td.textContent = cell || '';
        td.className = cell ? 'given' : 'empty';
      });
    });
  </script>
</body>
</html>
